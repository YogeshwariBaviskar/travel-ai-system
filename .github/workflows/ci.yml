name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: travel-ai

jobs:
  backend-test:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: travel_ai
          POSTGRES_PASSWORD: travel_ai_pass
          POSTGRES_DB: travel_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports --exclude alembic

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://travel_ai:travel_ai_pass@localhost:5432/travel_ai_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: test-key
          JWT_SECRET_KEY: test-secret-key-long-enough-for-hs256
          GOOGLE_OAUTH_CLIENT_ID: test-client-id
          GOOGLE_OAUTH_CLIENT_SECRET: test-client-secret
          BACKEND_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:3000
        run: pytest tests/unit/ -v --tb=short --cov=. --cov-report=xml

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://travel_ai:travel_ai_pass@localhost:5432/travel_ai_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: test-key
          JWT_SECRET_KEY: test-secret-key-long-enough-for-hs256
          GOOGLE_OAUTH_CLIENT_ID: test-client-id
          GOOGLE_OAUTH_CLIENT_SECRET: test-client-secret
          BACKEND_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:3000
        run: pytest tests/integration/ -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml

  frontend-test:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
        run: npm run build

  deploy:
    name: Deploy to AWS ECS
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$PROJECT_NAME-backend:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$PROJECT_NAME-backend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$PROJECT_NAME-backend:$IMAGE_TAG $ECR_REGISTRY/$PROJECT_NAME-backend:latest
          docker push $ECR_REGISTRY/$PROJECT_NAME-backend:latest

      - name: Build & push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$PROJECT_NAME-frontend:$IMAGE_TAG ./frontend-web
          docker push $ECR_REGISTRY/$PROJECT_NAME-frontend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$PROJECT_NAME-frontend:$IMAGE_TAG $ECR_REGISTRY/$PROJECT_NAME-frontend:latest
          docker push $ECR_REGISTRY/$PROJECT_NAME-frontend:latest

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster $PROJECT_NAME-cluster \
            --service $PROJECT_NAME-backend \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for ECS deployment
        run: |
          aws ecs wait services-stable \
            --cluster $PROJECT_NAME-cluster \
            --services $PROJECT_NAME-backend \
            --region $AWS_REGION

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          pip install alembic psycopg2-binary
          alembic upgrade head
